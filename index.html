<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="nav-buttons">

<a href="https://jphm22.github.io/FORMATO-TESTEO/" target="_blank">
<button class="nav-btn">Formato Testeo</button>
</a>

<a href="https://jphm22.github.io/Herramienta-para-consultas-SQL/" target="_blank">

<div class="title">

<h1>Herramienta de Generación de Scripts</h1>
<p>Generador de Variables y Generador de Banner</p>

</div>

</header>


<div class="container">

<!-- GENERADOR VARIABLES -->

<div class="section">

<h2>Generador de Variables</h2>

<div class="area">

<textarea id="variablesEntrada" placeholder="Pegue aquí el formato de variables..."></textarea>

<textarea id="variablesSalida" placeholder="Resultado del script..." readonly></textarea>

</div>

<button onclick="generarVariables()">Generar Variables</button>

</div>


<!-- GENERADOR BANNER -->

<div class="section">

<h2>Generador de Banner</h2>

<div class="controls">

<input id="bannerName" placeholder="Nombre del banner (ej: BANNER1)">

<button onclick="generarBanner()">Generar Banner</button>

</div>

<textarea id="bannerEntrada" placeholder="Pegue aquí las variables para el banner..."></textarea>

<div class="area">

<textarea id="bannerEstructura" placeholder="Estructura del banner..." readonly></textarea>

<textarea id="bannerLogica" placeholder="Lógica del banner..." readonly></textarea>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
